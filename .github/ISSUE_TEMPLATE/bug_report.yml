name: Bug Report
description: Report a bug or unexpected behavior.
labels: ["bug"]
body:
  - type: input
    id: title
    attributes:
      label: Bug title
      placeholder: Brief summary of the issue
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Python version, or any other relevant details.
      placeholder: |
        OS: macOS 15
        Browser: Chrome 130
        Python: 3.12
    validations:
      required: false
